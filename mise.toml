[tools]
uv = 'latest'
python = '3.13'
'pipx:serena-agent' = 'latest'

[tasks.serena-setup]
description = 'Install Serena + register it as a project-local MCP server for Claude Code'
run = [
  'uv tool install -p 3.13 serena-agent@latest --prerelease=allow',
  'serena init',
  'claude mcp add serena --scope project -- serena start-mcp-server --context claude-code --project-from-cwd',
]
